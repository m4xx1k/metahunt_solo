services:
  db:
    image: pgvector/pgvector:pg18
    container_name: metahunt-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: metahunt_railway
      POSTGRES_USER: metahunt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-metahunt}
      # PG18's image moved the default data dir under a version subdir; this
      # (external) volume already holds the prod restore at .../18/docker.
      PGDATA: /var/lib/postgresql/18/docker
    ports:
      - "54323:5432"
    volumes:
      - metahunt_railway_pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U metahunt -d metahunt_railway"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: metahunt-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: metahunt
      MINIO_ROOT_PASSWORD: metahunt123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - metahunt-minio-data:/data

  # one-shot: create the rss-payloads bucket on startup, then exits.
  minio-init:
    image: minio/mc:latest
    container_name: metahunt-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 metahunt metahunt123 >/dev/null 2>&1; do sleep 1; done;
      mc mb --ignore-existing local/rss-payloads;
      "

  # Temporal server (auto-setup persists schemas in the shared `db` Postgres
  # under separate `temporal` / `temporal_visibility` databases — no app-data
  # collision).
  temporal:
    image: temporalio/auto-setup:1.26
    container_name: metahunt-temporal
    restart: unless-stopped
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=metahunt
      - POSTGRES_PWD=${POSTGRES_PASSWORD:-metahunt}
      - POSTGRES_SEEDS=db
    ports:
      - "7233:7233"
    depends_on:
      db:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.34.0
    container_name: metahunt-temporal-ui
    restart: unless-stopped
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8080:8080"
    depends_on:
      - temporal

volumes:
  # Created outside compose (manual prod restore); reused as-is so there's no
  # data migration — see md/runbook/docker-dev.md.
  metahunt_railway_pgdata:
    external: true
  metahunt-minio-data:
